<!DOCTYPE html>
<html>
<head><title>Generar iconos</title></head>
<body>
<p>Haz clic en cada botón para descargar el icono correspondiente.</p>
<canvas id="c192" width="192" height="192" style="border:1px solid #ccc;margin:8px"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #ccc;margin:8px"><br>
<br>
<button onclick="gen(192)">Descargar icon-192.png</button>
<button onclick="gen(512)">Descargar icon-512.png</button>

<script>
function draw(size) {
  const id = size === 192 ? 'c192' : 'c512';
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const s = size;

  // Fondo negro redondeado
  ctx.fillStyle = '#1a1a1a';
  const r = s * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(s-r, 0);
  ctx.arcTo(s,0,s,r,r); ctx.lineTo(s,s-r);
  ctx.arcTo(s,s,s-r,s,r); ctx.lineTo(r,s);
  ctx.arcTo(0,s,0,s-r,r); ctx.lineTo(0,r);
  ctx.arcTo(0,0,r,0,r);
  ctx.closePath();
  ctx.fill();

  // Tablero ajedrez (esquina inferior derecha)
  const sq = s * 0.13;
  const cols = 3, rows = 3;
  const startX = s * 0.52, startY = s * 0.52;
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      if ((row + col) % 2 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fillRect(startX + col*sq, startY + row*sq, sq, sq);
      }
    }
  }

  // Letra A grande
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${s*0.42}px -apple-system, Arial`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('A', s*0.12, s*0.42);

  // Punto de sincronización / checkmark
  ctx.strokeStyle = '#34c759';
  ctx.lineWidth = s * 0.045;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(s*0.14, s*0.68);
  ctx.lineTo(s*0.24, s*0.79);
  ctx.lineTo(s*0.42, s*0.60);
  ctx.stroke();
}

function gen(size) {
  draw(size);
  const id = size === 192 ? 'c192' : 'c512';
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
}

draw(192); draw(512);
</script>
</body>
</html>
